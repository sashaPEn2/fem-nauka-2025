  var ini = d ? d.ini : '?';
  var fs = size < 36 ? '.62rem' : size < 60 ? '.85rem' : '1.1rem';
  if (src) return '<img src="' + src + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;border-radius:6px"/>';
  return '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:6px;background:var(--lb);display:flex;align-items:center;justify-content:center;font-size:' + fs + ';font-weight:800;color:var(--blue);flex-shrink:0">' + ini + '</div>';
}

function initLogos() {
  ['faculty','sno'].forEach(function(k) {
    var src = LOGOS[k];
    var img = document.getElementById('img-' + k);
    var ph  = document.getElementById('ph-' + k);

    else     { img.style.display = 'none'; ph.style.display = 'block'; }
  });
}

var deptNav = document.getElementById('dept-nav');
DEPTS.forEach(function(d) {
  var el = document.createElement('div');
  el.className = 'si';
  el.id = 'nav-' + d.id;
  el.innerHTML = '<div class="slogo">' + logoEl(d.id, 28) + '</div><span style="line-height:1.3">' + d.short + '</span>';
  el.onclick = function() { showPage(d.id); };
  deptNav.appendChild(el);
});

function setActiveNav(id) {
  document.querySelectorAll('.si').forEach(function(el) { el.classList.remove('active','red'); });
  var el = document.getElementById('nav-' + id);
  if (el) { el.classList.add('active'); if (DEPTS.some(function(d){return d.id===id;})) el.classList.add('red'); }
  var dept = DEPTS.find(function(d){return d.id===id;});
  var titles = {home:'Главная'};
  document.getElementById('topbar-title').textContent = dept ? dept.short : (titles[id] || '');
}

function showPage(id) {
  setActiveNav(id);
  closeSidebar();
  var app = document.getElementById('app');
  if (id === 'home') { renderHome(app); return; }
  var dept = DEPTS.find(function(d){return d.id===id;});
  if (dept) renderDept(app, dept);
}

function renderHome(app) {
  var h = '<div class="info-notice">'
    + '<h3>Информация об обновлениях</h3>'
    + '<p>Достижения студентов находятся в процессе добавления и будут полностью размещены в течение декады студенческой науки.</p>'
    + '</div>'
    + '<div class="intro"><h2>Добро пожаловать на ФЭМ.ЭКСПО 2026</h2><p>Приглашаем вас на онлайн-выставку научно-исследовательских достижений студентов факультета экономики и менеджмента 2025 года. Это уникальная цифровая площадка, где мы собрали самые смелые идеи, глубокие аналитические исследования и инновационные проекты наших студентов. От макроэкономических прогнозов до эффективных HR-стратегий — познакомьтесь с работами, которые формируют новый облик профессионального сообщества. Мы доказываем, что наука на факультете экономики и менеджмента — это не просто расчеты, а искусство управлять будущим.</p></div><div class="dgrid">';
  DEPTS.forEach(function(d) {
    var ach = achData[d.id] || [];
    var ind = ach.filter(function(a){return a.type==='ind';}).length;
    var snl = ach.filter(function(a){return a.type==='snil';}).length;
    h += '<div class="dc" onclick="showPage(\'' + d.id + '\')">'
      + '<div class="dclogo">' + logoEl(d.id, 48) + '</div>'
      + '<h3>' + d.title + '</h3><p>' + d.descgl + '</p>'
      + '<div class="stats"><span class="stat">' + ind + ' индивид.</span><span class="stat r">' + snl + ' СНИЛ</span></div>'
      + '</div>';
  });
  app.innerHTML = h + '</div>';
}

function renderSnilBlock(dept) {
  var snils = SNILS_DATA[dept.id] || [];
  var ach = achData[dept.id] || [];

  // Кнопка только если есть СНИЛы
  var btnHtml = snils.length > 0
    ? '<button class="snilb-btn" onclick="openSnilModal(\'' + dept.id + '\')">Статистика СНИЛов →</button>'
    : '';

  var h = '<div class="snilb">'
    + '<div class="snilb-header"><h4>СНИЛы кафедры</h4>' + btnHtml + '</div>';

  if (snils.length === 0) {
    h += '<div class="snilb-none">На данной кафедре СНИЛы отсутствуют</div>';
  } else {
    h += '<div class="snilb-list">';
    snils.forEach(function(s) {
      h += '<div class="snilb-item">'
        + '<div class="snilb-dot"></div>'
        + '<div><div class="snilb-name">' + s.name + '</div>'
        + '<div class="snilb-lead">Руководитель: ' + s.lead + '</div></div>'
        + '</div>';
    });
    h += '</div>';
    
    // Добавляем футер с информацией о реестре
    h += '<div class="snilb-footer">'
      + 'Полный список всех работ и достижений СНИЛов размещен в '
      + '<a href="https://reestr-fem-nauka.netlify.app/" target="_blank">Реестре научно-исследовательских работ кафедр ФЭМ</a>'
      + '</div>';
  }
  h += '</div>';
  return h;
}

function openSnilModal(deptId) {
  var dept = DEPTS.find(function(d){return d.id===deptId;});
  var snils = SNILS_DATA[deptId] || [];
  var ach = achData[deptId] || [];

  var h = '<button class="mc" onclick="closeSnilModalDirect()">✕</button>'
    + '<h3>СНИЛы — ' + dept.title + '</h3>';

  if (snils.length === 0) {
    h += '<div class="no-snil">На данной кафедре СНИЛы отсутствуют</div>';
  } else {
    snils.forEach(function(s) {
      var totalSnil = ach.filter(function(a){return a.type==='snil';}).length;
      var totalInd  = ach.filter(function(a){return a.type==='ind';}).length;
      var totalAll  = ach.length;

      h += '<div class="snilcard">'
        + '<div class="snilcard-title">' + s.name + '</div>'
        + '<div class="snilcard-row"><span class="snilcard-label">Руководитель</span><span class="snilcard-val">' + s.lead + '</span></div>'
        + '<div class="snilcard-row"><span class="snilcard-label">Направление</span><span class="snilcard-val">' + s.desc + '</span></div>';

      if (snils.indexOf(s) === snils.length - 1) {
        h += '<hr style="border:none;border-top:1px solid var(--bdr);margin:.7rem 0"/>'
          + '<div style="font-size:.78rem;color:#999;margin-bottom:.4rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Статистика работ по кафедре</div>'
          + '<div class="snilcard-stats">'
          + '<span class="snilcard-stat blue">Всего работ: ' + totalAll + '</span>'
          + '<span class="snilcard-stat blue">Индивидуальных: ' + totalInd + '</span>'
          + '<span class="snilcard-stat red">В рамках СНИЛ: ' + totalSnil + '</span>'
          + '</div>';
      }

      h += '</div>';
    });
  }

  document.getElementById('snilModal-content').innerHTML = h;
  document.getElementById('snilModal').classList.add('open');
}

function closeSnilModal(e) { if (e.target.id === 'snilModal') document.getElementById('snilModal').classList.remove('open'); }
function closeSnilModalDirect() { document.getElementById('snilModal').classList.remove('open'); }

function renderDept(app, dept) {
  var ach = achData[dept.id] || [];
  var ind = ach.filter(function(a){return a.type==='ind';}).length;
  var snl = ach.filter(function(a){return a.type==='snil';}).length;

  app.innerHTML = '<div class="dh">'
    + '<div class="dht"><div class="dblogo">' + logoEl(dept.id, 72) + '</div>'
    + '<div style="flex:1"><h2 style="font-size:1.15rem;font-weight:800;color:var(--blue);margin-bottom:.3rem;line-height:1.35">' + dept.title + '</h2>'
    + '<p style="font-size:.86rem;color:#555;line-height:1.6;margin-bottom:.5rem">' + dept.desc + '</p>'
    + '<a href="' + dept.url + '" target="_blank" class="dlink">Страница кафедры на сайте факультета ↗</a></div></div>'
    + '<div class="dmeta">'
    + '<div class="dmi">Заведующий кафедрой: <span>' + dept.head + '</span></div>'
    + '<div class="dmi">Всего работ студентов: <span>' + ach.length + '</span></div>'
    + '<div class="dmi">Индивидуальных: <span>' + ind + '</span></div>'
    + '<div class="dmi" style="color:var(--red)">В рамках СНИЛ: <span style="color:var(--red)">' + snl + '</span></div>'
    + '</div></div>'
    + renderSnilBlock(dept)
    + '<div class="tabs">'
    + '<button class="tab ab" onclick="filterAch(\'all\',this,\'' + dept.id + '\')">Все работы (' + ach.length + ')</button>'
    + '<button class="tab" onclick="filterAch(\'ind\',this,\'' + dept.id + '\')">Индивидуальные (' + ind + ')</button>'
    + '<button class="tab" onclick="filterAch(\'snil\',this,\'' + dept.id + '\')">В рамках СНИЛ (' + snl + ')</button>'
    + '</div>'
    + '<div class="agrid" id="ach-grid">' + renderAchGrid(ach, 'all') + '</div>';
}

function filterAch(type, btn, deptId) {
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('ab','ar');});
  btn.classList.add(type === 'snil' ? 'ar' : 'ab');
  document.getElementById('ach-grid').innerHTML = renderAchGrid(achData[deptId] || [], type);
}

function renderAchGrid(ach, type) {
  var list = type === 'all' ? ach : ach.filter(function(a){return a.type===type;});
  if (!list.length) return '<div class="empty">Достижения не найдены</div>';
  return list.map(function(a) {
    var ii = a.type === 'ind';
    return '<div class="ac' + (ii?'':' snil') + '" onclick="openModal(' + a.id + ')">'
      + '<div class="at">' + a.title + '</div>'
      + '<div class="as">' + a.student + '</div>'
      + '<div class="ay">' + a.year + '</div>'
      + '<span class="atag ' + (ii?'i':'s') + '">' + (ii?'Индивидуальная работа':'В рамках СНИЛ') + '</span>'
      + '</div>';
  }).join('');
}

function openModal(id) {
  var ach = null, deptName = '';
  var keys = Object.keys(achData);
  for (var i = 0; i < keys.length; i++) {
    var f = achData[keys[i]].find(function(a){return a.id===id;});
    if (f) { ach = f; var d = DEPTS.find(function(d){return d.id===keys[i];}); deptName = d ? d.short : ''; break; }
  }
  if (!ach) return;
  var ii = ach.type === 'ind';
  document.getElementById('modal-content').innerHTML =
    '<button class="mc" onclick="document.getElementById(\'modal\').classList.remove(\'open\')">✕</button>'
    + '<span class="mtag ' + (ii?'i':'s') + '">' + (ii?'Индивидуальная работа':'В рамках СНИЛ') + '</span>'
    + '<h3>' + ach.title + '</h3><hr class="mdiv"/>'
    + '<div class="mr"><span class="ml">ФИО студента</span><span class="mv">' + ach.student + '</span></div>'
    + '<div class="mr"><span class="ml">Научный руководитель</span><span class="mv">' + ach.supervisor + '</span></div>'
    + '<div class="mr"><span class="ml">Группа / год</span><span class="mv">' + ach.year + '</span></div>'
    + '<div class="mr"><span class="ml">Кафедра</span><span class="mv">' + deptName + '</span></div>'
    + (ach.link ? '<div class="mr"><span class="ml">Ссылка на статью</span><a class="mlink" href="' + ach.link + '" target="_blank">' + ach.link + '</a></div>' : '');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) { if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

async function loadFromContentful() {
  if (!CF_SPACE || !CF_TOKEN) return;
  var status = document.getElementById('cf-status');
  status.style.display = 'block';
  status.textContent = 'Загрузка из Contentful...';
  status.style.background = '#e8eef8';
  status.style.color = '#003087';
  try {
    var resp = await fetch('https://cdn.contentful.com/spaces/' + CF_SPACE + '/entries?content_type=' + CF_TYPE + '&limit=500', {headers:{Authorization:'Bearer ' + CF_TOKEN}});
    if (!resp.ok) {
      var err = await resp.json().catch(function(){return {};});
      status.textContent = 'Contentful ' + resp.status + ': ' + (err.message || resp.statusText);
      status.style.background = '#fdeaed'; status.style.color = '#c0001e';
      return;
    }
    var data = await resp.json();
    status.textContent = 'Загружено записей: ' + data.items.length;
    status.style.background = '#e0f5ea'; status.style.color = '#1a6b3a';
    setTimeout(function(){status.style.display='none';}, 3000);
    var fresh = {dept_agro:[],dept_ind:[],dept_nat:[],dept_org:[]};
    data.items.forEach(function(item, i) {
      var f = item.fields;
      if (!fresh[f.deptId]) return;
      fresh[f.deptId].push({
        id: 10000 + i,
        title:      f.title      || '',
        student:    f.student    || '',
        supervisor: f.supervisor || '',
        year:       f.year       || '',
        type:       (Array.isArray(f.type) ? f.type[0] : f.type || 'ind').toString().trim().toLowerCase(),
        link:       f.link       || ''
      });
    });
    achData = fresh;
    var activeDept = DEPTS.find(function(d){ var el=document.getElementById('nav-'+d.id); return el&&el.classList.contains('active'); });
    if (activeDept) renderDept(document.getElementById('app'), activeDept);
    else renderHome(document.getElementById('app'));
  } catch(e) {
    status.textContent = 'Ошибка: ' + e.message;
    status.style.background = '#fdeaed'; status.style.color = '#c0001e';
  }
}

initLogos();
loadFromContentful();
showPage('home');
</script>
